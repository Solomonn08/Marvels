<!DOCTYPE html>
<html>
<head><title>FeedMe - Join the Movement</title></head>
<body>
    <h2>Create Your FeedMe Profile</h2>
    <form method="POST">
        <input name="username" placeholder="Username" required><br><br>
        <input name="password" type="password" placeholder="Password" required><br><br>
        <label>Your Allergies (comma separated):</label><br>
        <input name="allergies" placeholder="e.g. Nuts, Dairy, Shellfish"><br><br>
        <button type="submit">Start Eating Smart</button>
    </form>
    <p>Already a member? <a href="/login">Login here</a></p>
</body>
</html>
