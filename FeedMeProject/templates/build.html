<!DOCTYPE html>
<html>
<head>
    <title>Customize Your Meal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Customize your {{ item.name }}</h2>
        <form method="POST">
            <p>Uncheck what you don't want (Save $0.50 per removed item):</p>
            
            <div class="ingredient-list">
                {% for ing in ingredients %}
                <label class="checkbox-container">
                    <input type="checkbox" name="ingredients" value="{{ ing }}" checked> 
                    <span>{{ ing }}</span>
                </label><br>
                {% endfor %}
            </div>

            <br>
            <button type="submit">Add to Lunchbox</button>
            <a href="/" class="btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
